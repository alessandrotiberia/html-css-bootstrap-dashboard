<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html-css-bootstrap-dashboard</title>
    <!--collegamento con bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles/index.css"> <!--collegato con css-->
</head>

<body>
    <header>
        <nav class="navbar bg-dark"> <!--colore dark alla navbar -->
            <div class="container"> <!--contenitore dove inserire tutto-->
                <a class="navbar-brand" href="#">
                    <!--data classe img e messa grandezza della paperella css-->
                    <img class="img" src="./img/duck.png" alt="paperella motivazionale">
                </a>
                <!--inserire bottone finto delle impostazioni-->
                <button class="navbar-toggler bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#menuMobile">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </nav>
    </header>
</body>

</html>
