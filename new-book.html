<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>new-book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./styles/index.css">
</head>
<header>
    <div class="container"> <!--contenitore dove inserire tutto-->
        <nav class="navbar  navbar-expand-lg navbar-dark bg-dark">
            <img src="./img/duck.png" alt="paperella motivazionale">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuMobile">
                <span class="navbar-toggler-icon"></span>
            </button>
        </nav>
    </div>
    <main class="container mt-4">
        <h2>Nuovo Libro</h2>

        <form action="">
            <div class="row mb-3">

                <div class="col-12 col-md-6">
                    <label for="nome" class="form-label">Nome Autore</label>
                    <input type="text" id="nome" class="form-control" placeholder="Inserisci il nome dell'autore">
                </div>

                <div class="col-12 col-md-6">
                    <label for="nome" class="form-label">Cognome Autore</label>
                    <input type="text" id="nome" class="form-control" placeholder="Inserisci il Cognome dell'autore">
                </div>
            </div>
            <div class="col-12"> <!--form label : ma l'etichetta di un form.-->
                <label for="Titolo" form="label">Titolo</label>
                <input type="text" id="Titolo" class="form-control" placeholder="inserisci titolo del libro">
                <div class="form-text">Titolo versione italiana</div> <!--commento sotto a titolo-->
            </div>
            <div class="row mb-4">

                <div class=" col-12 col-lg-4">
                    <label for="Genere" class="form-label">Genere</label>
                    <select name="Genere" id="Genere">
                        <option selected>Scegli il genere</option>
                        <option value="1">Romanzo</option>
                        <option value="2">Fumetto</option>
                        <option value="3">Saggio</option>
                    </select>

                    <div class="col-12 col-md-4 mb-3 mb-md-0">
                        <label for="Anno" class="form-label">Anno di pubblicazione</label>
                        <input type="number" name="Anno" id="Anno" placeholder="Inserisci l'anno">
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <label for="ISBN#">ISBN#</label>
                    <input type="text" name="password" id="password" placeholder="Inserisci il codice ISBN#">
                </div>
            </div>
            <hr class="my-4 text-secondary">

            <div class="row mb-4">
                <div class="col-12">
                    <label for="note" class="form-label">Note</label>
                    <textarea id="note" class="form-control" rows="4"
                        placeholder="Inserisci eventuali note sul libro"></textarea>
                </div>
            </div>

            <div class="form-check mb-4">
                <input type="checkbox" id="digitale" class="form-check-input">
                <label for="digitale" class="form-check-label">Disponibile anche in digitale</label>
            </div>

            <button type="submit" class="btn btn-primary">Aggiungi Libro</button>
        </form>
    </main>
</header>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
